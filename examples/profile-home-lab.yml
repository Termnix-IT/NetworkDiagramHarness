title: 自宅ネットワーク・クラウド構成
direction: TB

layout:
  profile: home_lab

zones:
  - id: internet
    name: インターネット

  - id: home_edge
    name: 自宅エッジ

  - id: dmz
    name: 自宅ラボサービス

  - id: internal
    name: 内部セグメント

  - id: cloud
    name: クラウド公開基盤

nodes:
  - id: internet
    name: インターネット
    type: external
    zone: internet

  - id: isp_edge
    name: 回線接続
    type: external
    zone: internet
    role: 光回線 / 動的DNS

  - id: edge_router
    name: エッジルーター
    type: firewall
    zone: home_edge
    role: NAT / Firewall / 自宅境界

  - id: lab_service_host
    name: ラボ用サーバー
    type: server
    zone: dmz
    role: 自宅内サービス

  - id: internal_router
    name: 内部ルーター
    type: firewall
    zone: internal
    role: VLAN / ACL / 監視

  - id: client_segment
    name: クライアント
    type: subnet
    zone: internal
    role: 日常利用端末

  - id: server_segment
    name: サーバー
    type: subnet
    zone: internal
    role: ラボ用途

  - id: wifi_segment
    name: Wi-Fi
    type: subnet
    zone: internal
    role: 無線端末

  - id: test_segment
    name: 検証環境
    type: subnet
    zone: internal
    role: 分離テスト

  - id: monitoring_server
    name: 監視サーバー
    type: server
    zone: internal
    role: メトリクス / ファイル共有

  - id: cdn
    name: CDN
    type: load_balancer
    zone: cloud
    role: 公開サイト配信

  - id: object_storage
    name: オブジェクトストレージ
    type: database
    zone: cloud
    role: 静的サイト配信元

connections:
  - source: internet
    target: isp_edge
    label: 光回線

  - source: isp_edge
    target: edge_router
    label: WAN

  - source: edge_router
    target: lab_service_host
    label: ラボ接続

  - source: edge_router
    target: internal_router
    label: 内部接続

  - source: internal_router
    target: client_segment
    label: クライアントVLAN

  - source: internal_router
    target: server_segment
    label: サーバーVLAN

  - source: internal_router
    target: wifi_segment
    label: Wi-Fi VLAN

  - source: internal_router
    target: test_segment
    label: 検証VLAN

  - source: monitoring_server
    target: internal_router
    label: ネットワーク監視

  - source: monitoring_server
    target: lab_service_host
    label: ホスト監視

  - source: internet
    target: cdn
    label: HTTPS 443 公開サイト

  - source: cdn
    target: object_storage
    label: オリジン
